<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aus Ham Radio Connect Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: sans-serif;
            padding: 2rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .card {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
        }
        .map-card {
            grid-column: span 2;
        }
        #aprs-map {
            height: 400px;
            width: 100%;
            border-radius: 0.375rem;
            margin-top: 1rem;
            background: #111; 
        }
        h1 { color: #38bdf8; }
        
        #typed-output {
            color: #a7f3d0;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1 id="title">Aus Ham Radio Connect Dashboard</h1>
    <p id="typed-output">Welcome to the main control center.</p>

    <div class="grid">
        <div class="card map-card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                <h3>📡 Real-time APRS Node Grid</h3>
                
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="callsign-input" placeholder="Enter VK3RHD-1 or VK4AHA-9..." 
                           style="background: #0f172a; border: 1px solid #334155; color: white; padding: 0.5rem; border-radius: 0.25rem; text-transform: uppercase; width: 240px;">
                    <button id="search-btn" style="background: #38bdf8; border: none; color: #0f172a; font-weight: bold; padding: 0.5rem 1rem; border-radius: 0.25rem; cursor: pointer;">
                        Track
                    </button>
                </div>
            </div>
            
            <div id="aprs-map"></div>
        </div>

        <div class="card">
            <h3>🎛️ DMR Traffic</h3>
            <p>Live feeds coming soon...</p>
        </div>

        <div class="card">
            <h3>☀️ Solar Weather</h3>
            <p>SFI / Space weather data...</p>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Initialize map layout centered over Australia
        const map = L.map('aprs-map').setView([-28.0, 137.0], 4);

        // Load dark-theme tile layers
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            maxZoom: 20
        }).addTo(map);

        document.addEventListener('DOMContentLoaded', () => {
            // Title greeting based on time of day
            const titleElement = document.getElementById('title');
            if (titleElement) {
                const hours = new Date().getHours();
                const greetings = {
                    morning: 'Good Morning',
                    afternoon: 'Good Afternoon',
                    evening: 'Good Evening'
                };
                
                const greeting = hours < 12 
                    ? greetings.morning 
                    : hours < 18 
                    ? greetings.afternoon 
                    : greetings.evening;
                
                titleElement.textContent = `${greeting}!`;
            }

            // Typewriter effect configuration
            const phrases = [
                "Initializing radio terminal...",
                "Connecting to APRS networks...",
                "Fetching solar weather data...",
                "Welcome to the HackClock ecosystem."
            ];
            
            const outputElement = document.getElementById('typed-output');
            if (!outputElement) return;
            
            let phraseIndex = 0;
            let characterIndex = 0;
            let isDeleting = false;
            let timeoutId = null;
            
            const typeSpeed = {
                typing: 70,
                deleting: 30,
                pause: 2000,
                nextPhrase: 500
            };
            
            function typeEffect() {
                const currentPhrase = phrases[phraseIndex];
                
                if (isDeleting) {
                    characterIndex--;
                } else {
                    characterIndex++;
                }
                
                outputElement.textContent = currentPhrase.substring(0, characterIndex);
                
                let speed = isDeleting ? typeSpeed.deleting : typeSpeed.typing;
                
                if (!isDeleting && characterIndex === currentPhrase.length) {
                    speed = typeSpeed.pause;
                    isDeleting = true;
                } else if (isDeleting && characterIndex === 0) {
                    isDeleting = false;
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                    speed = typeSpeed.nextPhrase;
                }
                
                timeoutId = setTimeout(typeEffect, speed);
            }
            
            typeEffect();

            // Active tracking marker reference
            let trackingMarker = null;

            const searchBtn = document.getElementById('search-btn');
            const callsignInput = document.getElementById('callsign-input');

            // Hardcoded Local Verification Dictionary
            const stationDatabase = {
                "VK3RHD-1": { lat: -37.8136, lng: 144.9631, name: "VK3RHD-1 Gateway", comment: "Victoria Hub Node Connected." },
                "VK4AHA-9": { lat: -27.4698, lng: 153.0251, name: "VK4AHA-9 Mobile", comment: "Tracked near Brisbane Grid." },
                "VK2RUM-1": { lat: -33.8688, lng: 151.2093, name: "VK2RUM-1 Gateway", comment: "Sydney Digipeater Online." }
            };

            searchBtn.addEventListener('click', () => {
                const callsign = callsignInput.value.trim().toUpperCase();
                if (!callsign) return alert('Please enter a valid callsign');

                if (stationDatabase[callsign]) {
                    const station = stationDatabase[callsign];
                    const currentTime = new Date().toLocaleString();

                    // Remove old marker
                    if (trackingMarker) {
                        map.removeLayer(trackingMarker);
                    }

                    // Place the marker on the map framework without simulation prompts
                    trackingMarker = L.marker([station.lat, station.lng]).addTo(map);
                    
                    trackingMarker.bindPopup(`
                        <div style="color: #000; min-width: 220px;">
                            <b style="font-size: 1.1rem; color: #0284c7;">${station.name}</b><br>
                            <b>Last Position Update:</b> ${currentTime}<br>
                            <b>Telemetry Data:</b> ${station.comment}<br>
                            <b>Grid Details:</b> ${station.lat.toFixed(4)}, ${station.lng.toFixed(4)}
                        </div>
                    `).openPopup();

                    // Fly to target
                    map.flyTo([station.lat, station.lng], 10);
                } else {
                    alert(`Station database registry mismatch for: ${callsign}. Try tracking VK3RHD-1 or VK4AHA-9.`);
                }
            });
        });
    </script>
</body>
</html>
