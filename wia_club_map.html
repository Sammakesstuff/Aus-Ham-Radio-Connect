<style>
  :root{
    --bg:#0f1115; --panel:#161a21; --panel2:#1d232c; --border:#2a3138;
    --text:#e8ecf1; --muted:#8b96a5; --accent:#4fb3ff;
    --vk1:#e05c5c; --vk2:#f2a154; --vk3:#f2d24a; --vk4:#6bd17f;
    --vk5:#4fc2c2; --vk6:#4f8ef2; --vk7:#a76bf2; --vk8:#e05ca0;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);}
  #app{display:flex;height:100vh;width:100vw;overflow:hidden;}
  #sidebar{width:360px;min-width:300px;max-width:420px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;}
  #sidebar-header{padding:16px 16px 10px;border-bottom:1px solid var(--border);}
  #sidebar-header h1{font-size:16px;margin:0 0 4px;font-weight:700;letter-spacing:.2px;}
  #sidebar-header p{font-size:12px;color:var(--muted);margin:0;line-height:1.4;}
  #search{width:100%;margin-top:10px;padding:9px 10px;border-radius:8px;border:1px solid var(--border);background:var(--panel2);color:var(--text);font-size:13px;outline:none;}
  #search:focus{border-color:var(--accent);}
  #stateFilters{display:flex;flex-wrap:wrap;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border);}
  .chip{cursor:pointer;font-size:11px;font-weight:700;padding:5px 9px;border-radius:999px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);user-select:none;transition:all .15s;}
  .chip.active{color:#0f1115;}
  .chip[data-state="VK1"].active{background:var(--vk1);border-color:var(--vk1);}
  .chip[data-state="VK2"].active{background:var(--vk2);border-color:var(--vk2);}
  .chip[data-state="VK3"].active{background:var(--vk3);border-color:var(--vk3);}
  .chip[data-state="VK4"].active{background:var(--vk4);border-color:var(--vk4);}
  .chip[data-state="VK5"].active{background:var(--vk5);border-color:var(--vk5);}
  .chip[data-state="VK6"].active{background:var(--vk6);border-color:var(--vk6);}
  .chip[data-state="VK7"].active{background:var(--vk7);border-color:var(--vk7);}
  .chip[data-state="VK8"].active{background:var(--vk8);border-color:var(--vk8);}
  #count{padding:8px 16px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);}
  #list{flex:1;overflow-y:auto;padding:6px 0;}
  .club-item{padding:10px 16px;border-bottom:1px solid #1d232c;cursor:pointer;}
  .club-item:hover{background:var(--panel2);}
  .club-item .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;}
  .club-item .name{font-size:13px;font-weight:600;color:var(--text);}
  .club-item .meta{font-size:11px;color:var(--muted);margin-top:2px;padding-left:15px;}
  .club-item.national .meta{font-style:italic;}
  #map{flex:1;background:#0f1115;}
  .leaflet-tile-pane{filter:invert(1) hue-rotate(180deg) brightness(0.95) contrast(0.9) saturate(0.6);}
  #errorBanner{display:none;position:absolute;top:0;left:0;right:0;background:#e05c5c;color:#fff;padding:10px 16px;font-size:13px;z-index:2000;text-align:center;}
  .leaflet-popup-content-wrapper{background:var(--panel);color:var(--text);border-radius:10px;}
  .leaflet-popup-tip{background:var(--panel);}
  .popup h3{margin:0 0 4px;font-size:14px;}
  .popup .region{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--panel2);color:var(--accent);margin-bottom:6px;}
  .popup p{margin:2px 0;font-size:12px;color:var(--muted);}
  .popup a{color:var(--accent);text-decoration:none;font-size:12px;font-weight:600;}
  .popup a:hover{text-decoration:underline;}
  .approx-note{font-size:10px;color:#e0a25c;margin-top:4px;}
  #legend{position:absolute;bottom:20px;left:20px;background:rgba(22,26,33,.92);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:11px;z-index:1000;backdrop-filter:blur(4px);}
  #legend .row{display:flex;align-items:center;gap:6px;margin:3px 0;}
  #legend .sw{width:9px;height:9px;border-radius:50%;}
  #nationalPanel{border-top:1px solid var(--border);max-height:150px;overflow-y:auto;}
  #nationalPanel h4{font-size:11px;color:var(--muted);margin:10px 16px 6px;text-transform:uppercase;letter-spacing:.5px;}
  #nationalPanel .club-item{padding:6px 16px;}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:#2a3138;border-radius:4px;}
</style>
</head>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>Techsam12 VK4AHA and Claude</h1>
      <h2>Location isnt very accurate, best to look on google maps</h2>
      <p>Amateur radio clubs across Australia, sourced from the Wireless Institute of Australia club directory (wia.org.au/clubs).</p>
      <input id="search" type="text" placeholder="Search clubs, towns, callsigns…">
    </div>
    <div id="stateFilters"></div>
    <div id="count"></div>
    <div id="list"></div>
    <div id="nationalPanel">
      <h4>National / No Fixed Location</h4>
      <div id="nationalList"></div>
    </div>
  </div>
  <div id="map">
    <div id="errorBanner"></div>
    <div id="legend"></div>
  </div>
</div>

<script>
function showError(msg){
  const b = document.getElementById('errorBanner');
  b.textContent = '⚠ ' + msg;
  b.style.display = 'block';
}
window.addEventListener('error', function(e){
  showError('Something failed to load (' + (e.message || 'unknown error') + '). Check your internet connection — this page needs to reach cdnjs.cloudflare.com and tile.openstreetmap.org.');
});
if (typeof L === 'undefined') {
  showError('Leaflet failed to load from cdnjs.cloudflare.com. Check your internet connection or try opening this file in a different browser.');
}
</script>

];

// ---------------------------------------------------------------------------
// MAP INIT
// ---------------------------------------------------------------------------
try {

const map = L.map('map', {zoomControl:true}).setView([-27, 133], 4.4);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  subdomains: 'abc',
  maxZoom: 19
}).addTo(map);

function makeIcon(color, isSW){
  return L.divIcon({
    className:'',
    html:`<div style="
        width:${isSW?16:14}px;height:${isSW?16:14}px;border-radius:50%;
        background:${color};border:2px solid #0f1115;
        box-shadow:0 0 0 2px ${color}55;${isSW?'outline:2px dashed #ffffffaa;outline-offset:2px;':''}
      "></div>`,
    iconSize:[16,16], iconAnchor:[8,8], popupAnchor:[0,-8]
  });
}

const markers = [];
clubs.forEach((c,i)=>{
  const color = STATE_INFO[c.s].color;
  const marker = L.marker([c.lat,c.lng], {icon: makeIcon(color, c.sw)});
  marker.bindPopup(`
    <div class="popup">
      <span class="region" style="color:${color}">${c.s} · ${STATE_INFO[c.s].label}</span>
      <h3>${c.n}</h3>
      <p>${c.t}${c.sw?' · state-wide organisation':''}</p>
      <a href="${BASE}${c.u}" target="_blank" rel="noopener">View club page →</a>
      ${c.sw?'<div class="approx-note">📍 Pin marks the region hub, not a physical clubhouse.</div>':'<div class="approx-note">📍 Approximate location (town-level, from club name/region).</div>'}
    </div>
  `);
  marker.addTo(map);
  markers.push({marker, data:c, idx:i});
});

// ---------------------------------------------------------------------------
// SIDEBAR: state filter chips
// ---------------------------------------------------------------------------
const activeStates = new Set(Object.keys(STATE_INFO));
const filtersEl = document.getElementById('stateFilters');
Object.entries(STATE_INFO).forEach(([code,info])=>{
  const chip = document.createElement('div');
  chip.className = 'chip active';
  chip.dataset.state = code;
  chip.textContent = `${code} · ${info.label}`;
  chip.addEventListener('click', ()=>{
    if(activeStates.has(code)){ activeStates.delete(code); chip.classList.remove('active'); }
    else { activeStates.add(code); chip.classList.add('active'); }
    render();
  });
  filtersEl.appendChild(chip);
});

// ---------------------------------------------------------------------------
// LIST + SEARCH + RENDER
// ---------------------------------------------------------------------------
const listEl = document.getElementById('list');
const countEl = document.getElementById('count');
const searchEl = document.getElementById('search');

function render(){
  const q = searchEl.value.trim().toLowerCase();
  let visibleCount = 0;
  listEl.innerHTML = '';
  markers.forEach(({marker,data})=>{
    const matchesState = activeStates.has(data.s);
    const matchesSearch = !q || data.n.toLowerCase().includes(q) || data.t.toLowerCase().includes(q) || data.s.toLowerCase().includes(q);
    const show = matchesState && matchesSearch;
    if(show){
      marker.setOpacity(1);
      if(!map.hasLayer(marker)) marker.addTo(map);
      visibleCount++;
      const item = document.createElement('div');
      item.className = 'club-item';
      item.innerHTML = `<span class="dot" style="background:${STATE_INFO[data.s].color}"></span><span class="name">${data.n}</span><div class="meta">${data.t} · ${data.s}</div>`;
      item.addEventListener('click', ()=>{
        map.setView([data.lat,data.lng], 11, {animate:true});
        marker.openPopup();
      });
      listEl.appendChild(item);
    } else {
      if(map.hasLayer(marker)) map.removeLayer(marker);
    }
  });
  countEl.textContent = `Showing ${visibleCount} of ${clubs.length} clubs`;
}
searchEl.addEventListener('input', render);
render();

// National orgs panel
const nationalListEl = document.getElementById('nationalList');
nationalOrgs.forEach(o=>{
  const item = document.createElement('div');
  item.className = 'club-item national';
  item.innerHTML = `<span class="dot" style="background:${STATE_INFO[o.s].color}"></span><span class="name">${o.n}</span><div class="meta">No fixed clubhouse · <a href="${BASE}${o.u}" target="_blank" style="color:var(--accent);">club page</a></div>`;
  nationalListEl.appendChild(item);
});

// Legend
const legendEl = document.getElementById('legend');
legendEl.innerHTML = '<div style="font-weight:700;margin-bottom:6px;">Legend</div>' +
  Object.entries(STATE_INFO).map(([code,info])=>`<div class="row"><span class="sw" style="background:${info.color}"></span>${code} — ${info.label}</div>`).join('') +
  '<div class="row" style="margin-top:6px;"><span class="sw" style="background:#fff;outline:2px dashed #ffffffaa;"></span>Dashed ring = state-wide org</div>';

} catch (err) {
  console.error(err);
  showError('Map failed to initialize: ' + err.message);
}
