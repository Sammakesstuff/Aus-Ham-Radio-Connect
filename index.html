<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aus Ham Radio Connect Dashboard</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: sans-serif;
            padding: 2rem;
            margin: 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .card {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
        }
        .map-card {
            grid-column: span 2;
        }
        #aprs-map {
            height: 400px;
            width: 100%;
            border-radius: 0.375rem;
            margin-top: 1rem;
            background: #111; 
        }
        h1 { color: #38bdf8; }
        #typed-output {
            color: #a7f3d0;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1 id="title">Aus Ham Radio Connect Dashboard</h1>
    <p id="typed-output">Desktop Engine Initialized.</p>

    <div class="grid">
        <div class="card map-card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                <h3>📡 APRS Data provided by APRS.fi</h3>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="callsign-input" placeholder="Enter Callsign..." 
                           style="background: #0f172a; border: 1px solid #334155; color: white; padding: 0.5rem; border-radius: 0.25rem; text-transform: uppercase; width: 200px;">
                    <button id="search-btn" style="background: #38bdf8; border: none; color: #0f172a; font-weight: bold; padding: 0.5rem 1rem; border-radius: 0.25rem; cursor: pointer;">
                        Track
                    </button>
                </div>
            </div>
            <div id="aprs-map"></div>
        </div>

        <div class="card">
            <h3>🎛️ DMR Traffic</h3>
            <p>Live feeds coming soon...</p>
        </div>

        <div class="card">
            <h3>☀️ Solar Weather</h3>
            <p>SFI / Space weather data...</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <script>
        const map = L.map('aprs-map').setView([-28.0, 137.0], 4);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; CARTO',
            maxZoom: 20
        }).addTo(map);

        document.addEventListener('DOMContentLoaded', () => {
            let trackingMarker = null;
            const searchBtn = document.getElementById('search-btn');
            const callsignInput = document.getElementById('callsign-input');

            searchBtn.addEventListener('click', async () => {
                const callsign = callsignInput.value.trim().toUpperCase();
                if (!callsign) return alert('Please enter a valid callsign');

                const apiKey = '215889.nnmMKVUZjhC1x1L'; 
                const targetUrl = `https://api.aprs.fi/api/get?name=${callsign}&what=loc&format=json&apikey=${apiKey}`;

                try {
                    // Desktop container environment unblocks direct native fetch requests
                    const response = await fetch(targetUrl);
                    if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                    
                    const data = await response.json();

                    if (data.result === 'ok' && data.found > 0) {
                        const entry = data.entries[0];
                        const lat = parseFloat(entry.lat);
                        const lng = parseFloat(entry.lng);
                        const comment = entry.comment || 'No telemetry message.';
                        const lastTime = new Date(parseInt(entry.time) * 1000).toLocaleString();

                        if (trackingMarker) map.removeLayer(trackingMarker);

                        trackingMarker = L.marker([lat, lng]).addTo(map);
                        trackingMarker.bindPopup(`
                            <div style="color: #000; min-width: 220px;">
                                <b style="font-size: 1.1rem; color: #0284c7;">${entry.name}</b><br>
                                <b>Last Position:</b> ${lastTime}<br>
                                <b>Comment:</b> ${comment}<br>
                                <b>Coordinates:</b> ${lat.toFixed(4)}, ${lng.toFixed(4)}
                            </div>
                        `).openPopup();

                        map.flyTo([lat, lng], 11);
                    } else {
                        alert(`No data found for callsign: ${callsign}`);
                    }
                } catch (error) {
                    console.error(error);
                    alert('API Query Failed.');
                }
            });
        });
    </script>
</body>
</html>
