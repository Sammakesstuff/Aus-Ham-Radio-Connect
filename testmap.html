<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Connect Test Panel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />

    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: sans-serif;
            padding: 2rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .card {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
        }
        .map-card {
            grid-column: span 2;
        }
        #aprs-map {
            height: 400px;
            width: 100%;
            border-radius: 0.375rem;
            margin-top: 1rem;
            background: #222; 
        }
        h1 { color: #38bdf8; }
        #typed-output {
            color: #a7f3d0;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1 id="title">Aus Ham Radio Connect Dashboard</h1>
    <p id="typed-output">System booting...</p>

    <div class="grid">
        <div class="card map-card">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
                <h3>📡 Real-time APRS Node Grid</h3>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="callsign-input" placeholder="Type VK3RHD-1..." 
                           style="background: #0f172a; border: 1px solid #334155; color: white; padding: 0.5rem; border-radius: 0.25rem; text-transform: uppercase; width: 200px;">
                    <button id="search-btn" style="background: #38bdf8; border: none; color: #0f172a; font-weight: bold; padding: 0.5rem 1rem; border-radius: 0.25rem; cursor: pointer;">
                        Track
                    </button>
                </div>
            </div>
            <div id="aprs-map"></div>
        </div>

        <div class="card">
            <h3>🎛️ DMR Traffic</h3>
            <p>Live feeds coming soon...</p>
        </div>

        <div class="card">
            <h3>☀️ Solar Weather</h3>
            <p>SFI / Space weather data...</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    
    <script>
        console.log("Script execution started.");

        // Safe Map Initialization
        let map;
        try {
            map = L.map('aprs-map').setView([-28.0, 137.0], 4);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CARTO',
                maxZoom: 20
            }).addTo(map);
            console.log("Leaflet engine loaded successfully.");
        } catch (e) {
            console.error("Leaflet failed to initialize:", e);
            alert("Browser blocked the Map Engine from loading. Open Developer Tools (F12) to see details.");
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Typewriter effect
            const outputElement = document.getElementById('typed-output');
            if (outputElement) {
                outputElement.textContent = "Welcome to the main control center.";
            }

            let trackingMarker = null;
            const searchBtn = document.getElementById('search-btn');
            const callsignInput = document.getElementById('callsign-input');

            // 100% Local Station Database
            const stationDatabase = {
                "VK3RHD-1": { lat: -37.8136, lng: 144.9631, name: "VK3RHD-1 Hub", comment: "Victoria Digital Voice Hub Node active." },
                "VK4AHA-9": { lat: -27.4698, lng: 153.0251, name: "VK4AHA-9 Mobile", comment: "Grid tracked near Brisbane." },
                "VK2RUM-1": { lat: -33.8688, lng: 151.2093, name: "VK2RUM-1 Gateway", comment: "Sydney Digipeater Online." }
            };

            if (searchBtn) {
                searchBtn.addEventListener('click', () => {
                    console.log("Track button clicked.");
                    const callsign = callsignInput.value.trim().toUpperCase();
                    if (!callsign) return alert('Please enter a valid callsign');

                    if (stationDatabase[callsign]) {
                        const station = stationDatabase[callsign];
                        console.log("Matching station found local:", station);

                        if (trackingMarker) {
                            map.removeLayer(trackingMarker);
                        }

                        trackingMarker = L.marker([station.lat, station.lng]).addTo(map);
                        trackingMarker.bindPopup(`<b>${station.name}</b><br>${station.comment}`).openPopup();
                        map.flyTo([station.lat, station.lng], 10);
                    } else {
                        alert(`No match found for: ${callsign}. Try tracking exactly: VK3RHD-1`);
                    }
                });
            }
        });
    </script>
</body>
</html>
